<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Sitio Web</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            scroll-behavior: smooth;
        }
        header {
            background: #333;
            color: white;
            padding: 15px;
            position: fixed;
            width: 100%;
            top: 0;
        }
        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
        }
        section {
            padding: 100px 20px;
            min-height: 100vh;
        }
        #inicio { background: #f4f4f4; }
        #servicios { background: #ddd; }
        #nosotros { background: #bbb; }
        #contacto { background: #999; }
        footer {
            background: #222;
            color: white;
            text-align: center;
            padding: 10px;
        }
    </style>
</head>
<body>

<header>
    <nav>
        <a href="#inicio">Inicio</a>
        <a href="#servicios">Servicios</a>
        <a href="#nosotros">Nosotros</a>
        <a href="#contacto">Contacto</a>
    </nav>
</header>

<section id="inicio">
    <h1>Bienvenido</h1>
    <p>Este es mi sitio web de una sola página.</p>
</section>

<section id="servicios">
    <h2>Servicios</h2>
    <p>Aquí describes lo que ofreces.</p>
</section>

<section id="nosotros">
    <h2>Nosotros</h2>
    <p>Información sobre ti o tu empresa.</p>
</section>

<section id="contacto">
    <h2>Contacto</h2>
    <p>Email: ejemplo@email.com</p>
</section>

<footer>
    <p>© 2026 Mi Sitio Web</p>
</footer>

</body>
</html>
